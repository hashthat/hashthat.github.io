<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Business Card</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://rawgit.com/mayognaise/aframe-gif-shader/master/dist/aframe-gif-shader.min.js"></script>
  <script src="main.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    .btn {
      background-color: rgba(179, 179, 179, 0.5);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid white;
      display: inline-block;
      margin: 5px;
      z-index: 1;
    }
    .btn img {
      width: 50px;
      margin: 10px;
    }
    .button-container {
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    @media (max-width: 600px) {
      .btn {
        width: 50px;
        height: 50px;
      }
      .btn img {
        width: 40px;
      }
    }
  </style>
</head>
<body>
  <!-- Buttons -->
  <div class="button-container">
    <a class="btn" href="tel:918-428-6328">
      <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_phone.png?v=1597742071231" alt="Phone Icon">
    </a>
    <a class="btn" href="https://github.com/hashthat" target="_blank">
      <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_web.png?v=1597742071155" alt="GitHub Icon">
    </a>
    <a class="btn" href="https://www.linkedin.com/in/samuel-alberts/" target="_blank">
      <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_social.png?v=1597742071215" alt="LinkedIn Icon">
    </a>
    <a class="btn" href="mailto:earthstar412@gmail.com" target="_blank">
      <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_mail.png?v=1597742071197" alt="Mail Icon">
    </a>
  </div>

  <!-- AR Scene -->
  <a-scene arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" embedded>
    <!-- Marker-based AR using the custom image pattern -->
    <a-marker type="pattern" url="https://github.com/hashthat/hashthat.github.io/blob/main/gitPage.patt">
    <a-text value="Welcome to my AR business card!" color="black" position="0 1 0" scale="3 3 3"> 
      <a-plane
        height="4.8"
        width="7"
        material="shader: gif; src: url(https://giffiles.alphacoders.com/407/4070.gif);"
        transparent="true"
        rotation="-90"
        position="0 0.3 0">
      </a-plane>
      </a-text>
    </a-marker>

    <!-- a-marker-camera preset="custom" type="pattern" url="https://github.com/hashthat/hashthat.github.io/pattern-ScanME.patt"></a-marker-camera -->

  </a-scene>
</body>
</html>
