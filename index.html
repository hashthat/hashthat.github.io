<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    </head>

    <body style="margin: 0px; overflow: hidden;">
        <!-- Video overlay container -->
        <div id="videoOverlay" class="video-overlay" style="display:none;">
            <!-- Updating link to the video -->
            <iframe id="videoIframe" src="https://www.youtube.com/watch?v=u0hVXoR4ibg"
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

            <button onclick="closeVideo()">Close Video</button>
        </div>

        <!-- Overlay for AR -->
        <a-plane position="0 0 -1" width="10" height="10" material="src: url('https://raw.githubusercontent.com/hashthat/hashthat.github.io/main/dreadz.png'); opacity: 0.5; transparent: true;">
        </a-plane>

        <a-scene arjs>
            <a-marker preset='custom' type='pattern' url='https://github.com/hashthat/hashthat.github.io/blob/main/gitPage.patt'>
                <a-image src="https://your-image-url-here.com/image.jpg" position="0 0.5 0" width="2" height="2"></a-image>
                <a-box color="red" position="0 0 0.5"></a-box>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>

        <style>
            /* Styling for the video overlay */
            .video-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 10;
            }

            .video-overlay iframe {
                width: 80%;
                height: 45%;
                border: none;
                border-radius: 10px;
            }

            .video-overlay button {
                position: absolute;
                bottom: 20px;
                background-color: #f04d4d;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 18px;
                cursor: pointer;
                border-radius: 5px;
            }

            /* Button styling */
            .btn {
                background-color: rgb(179, 179, 179, 0.5);
                width: 70px;
                height: 70px;
                border-radius: 60px;
                border: 4px solid white;
                display: inline-block;
                margin: 5px;
                z-index: 1;
            }

            .button-container {
                height: 100%;
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                display: flex;
                justify-content: center;
                align-items: flex-end;
            }
        </style>

        <div class="button-container">
            <!-- Phone WhatsApp -->
            <a class="btn" href="tel:918-428-6328">
                <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_phone.png?v=1597742071231" style="width:50px;margin:10px;" />
            </a>
            <!-- MusicStreaming -->
            <a class="btn" href="https://soundcloud.com/republikofthesun/wondering?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing">
                <i class="fas fa-headphones" style="font-size: 30px;"></i>
            </a>
            <!-- Miro Sketches and BluePrints -->
            <a class="btn" href="https://miro.com/miroverse/musicians-hub-wireframe-blueprint/" target="_blank">
                <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_web.png?v=1597742071155" style="width:50px;margin:10px;" />
            </a>
            <!-- Prototype of App in Axure -->
            <a class="btn" href="https://qcgysh.axshare.com/?id=gs3s0q&p=userlogin" target="_blank">
                <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_web.png?v=1597742071155" style="width:50px;margin:10px;" />
            </a>
            <!-- LinkedIn/Social Media -->
            <a class="btn" href="https://www.linkedin.com/in/samuel-alberts/" target="_blank">
                <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_social.png?v=1597742071215" style="width:50px;margin:10px;" />
            </a>
            <!-- Email -->
            <a class="btn" href="mailto:earthstar412@gmail.com" target="_blank">
                <img src="https://cdn.glitch.com/ec1a8deb-f8ab-4b0c-b059-f454239c610f%2Ficon_mail.png?v=1597742071197" style="width:50px;margin:10px;" />
            </a>
        </div>

        <a-scene arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" embedded cursor="rayOrigin: mouse" renderer="logarithmicDepthBuffer: true;" vr-mode-ui="enabled: false" gesture-detector>
            <a-marker-camera type="pattern" preset="custom" url="https://github.com/hashthat/hashthat.github.io/blob/main/gitPage.patt">
                <a-image src="https://your-image-url-here.com/image.jpg" position="0 0.5 0" width="2" height="2"></a-image>
            </a-marker-camera>    
        </a-scene>

        <script>
            // Function to show video overlay when the page is loaded
window.onload = function() {
    document.getElementById('videoOverlay').style.display = 'flex';
    startVideo(); // Start the video when the page loads
};

// Function to start the video by resetting the iframe src
function startVideo() {
    const iframe = document.getElementById('videoIframe');
    const iframeSrc = iframe.src;
    iframe.src = '';  // Remove the video source to stop playback
    iframe.src = iframeSrc;  // Reload the video
}

// Function to close the video overlay and stop the video
function closeVideo() {
    // Hide the video overlay
    document.getElementById('videoOverlay').style.display = 'none';

    // Stop the YouTube video by resetting the iframe src to an empty string
    const iframe = document.getElementById('videoIframe');
    iframe.src = '';  // Stop the video
}

        </script>
    </body>
</html>
